name: Rust Native Build

on:
  push:
    paths:
      - 'native/**'
      - '.github/workflows/rust-build.yml'
  pull_request:
    paths:
      - 'native/**'
      - '.github/workflows/rust-build.yml'

permissions:
  contents: read

jobs:
  test:
    name: Test (Rust)
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc,i686-pc-windows-msvc

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            native/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('native/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Run tests
        working-directory: native
        run: cargo test --all

      - name: Check formatting
        working-directory: native
        run: cargo fmt --all -- --check
        continue-on-error: true

      - name: Run clippy
        working-directory: native
        run: cargo clippy --all -- -D warnings
        continue-on-error: true

  build:
    name: Build DLL (${{ matrix.arch }})
    runs-on: windows-latest
    needs: test

    strategy:
      matrix:
        include:
          - arch: x64
            target: x86_64-pc-windows-msvc
          - arch: x86
            target: i686-pc-windows-msvc

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            native/target/
          key: ${{ runner.os }}-cargo-${{ matrix.arch }}-${{ hashFiles('native/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-${{ matrix.arch }}-

      - name: Build release DLL
        working-directory: native
        run: cargo build --release --target ${{ matrix.target }} -p termaccess-ffi

      - name: Build release helper EXE
        working-directory: native
        run: cargo build --release --target ${{ matrix.target }} -p termaccess-helper

      - name: Upload DLL artifact
        uses: actions/upload-artifact@v4
        with:
          name: termaccess-dll-${{ matrix.arch }}
          path: native/target/${{ matrix.target }}/release/termaccess_ffi.dll
          if-no-files-found: error

      - name: Upload helper EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: termaccess-helper-${{ matrix.arch }}
          path: native/target/${{ matrix.target }}/release/termaccess-helper.exe
          if-no-files-found: error
